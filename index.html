<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Spensa - Smart Money Tracker</title>
    <meta name="description" content="Real-time money tracker with smart budgeting rules for students and professionals">
    <meta name="keywords" content="money tracker, budget, expense tracker, savings, financial planning, spensa">
    <meta property="og:title" content="Spensa - Smart Money Tracker">
    <meta property="og:description" content="Manage your income with smart budgeting rules and track expenses in real-time">
    <meta name="twitter:title" content="Spensa - Smart Money Tracker">
    <meta name="twitter:description" content="Manage your income with smart budgeting rules and track expenses in real-time">

    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Spensa">
    <link rel="apple-touch-icon" href="https://app.trickle.so/storage/public/images/usr_173f09e758000001/227f35e7-5ab9-4689-9b04-01b138000659.png">

    <!-- Android / Chrome PWA -->
    <meta name="theme-color" content="#e63946">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- FIX 1: Fonts must load first, before any rendering begins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">

    <!-- Firebase init loaded as EXTERNAL module script.
         Babel standalone only transpiles inline scripts and ignores
         external scripts with a src attribute — so import statements
         in firebase-init.js are never touched by Babel.
         This fixes: "Cannot use import statement outside a module" -->
    <script type="module" src="firebase-init.js"></script>

    <!-- FIX 6: React, Babel, Tailwind, Chart.js loaded BEFORE any component
         scripts. The original had fonts and icons at the bottom of <head> but
         these libraries were also mid-page — Babel needs to be present before
         any type="text/babel" script tag is encountered by the parser. -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS stable CDN (no console warning, production safe) -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <!-- Custom component styles -->
    <link href="assets/styles.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
    <script>
      // FIX 7: Alias Chart to ChartJS safely. The original did this in a
      // separate <script> tag which is fine, but guard it in case Chart.js
      // fails to load (e.g. CDN down) so it doesn't crash the whole page.
      if (window.Chart) {
        window.ChartJS = window.Chart;
      } else {
        console.error('Chart.js failed to load — charts will not render');
      }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <!-- FIX 8: Auth loading overlay — shown until Firebase resolves -->
    <div id="firebase-loader">
      <div class="loader-spinner"></div>
    </div>

    <nav id="main-nav" style="display: none;"></nav>
    <div id="root"></div>

    <!-- FIX 9: Script load ORDER is critical for Babel-transpiled components.
         Order must be:
           1. Pure utility functions (no JSX, no React)
           2. Base React components (no dependencies on other components)
           3. Composite components (depend on base components)
           4. Pages / top-level components
           5. firestoreSync and storage (used by app.js)
           6. app.js LAST

         The original had storage.js and firestoreSync.js loaded AFTER app.js
         in some versions, which means app.js called saveToStorage and
         saveMonthToFirestore before those functions existed on window. -->

    <!-- Utilities (no JSX) -->
    <script type="text/babel" src="utils/currencyFormatter.js"></script>
    <script type="text/babel" src="utils/budgetRules.js"></script>
    <script type="text/babel" src="utils/budgetBalancer.js"></script>
    <script type="text/babel" src="utils/suggestionEngine.js"></script>
    <script type="text/babel" src="utils/storage.js"></script>
    <script type="text/babel" src="utils/firestoreSync.js"></script>

    <!-- Base UI components -->
    <script type="text/babel" src="components/SpensaLogo.js"></script>
    <script type="text/babel" src="components/Alert.js"></script>
    <script type="text/babel" src="components/Modal.js"></script>
    <script type="text/babel" src="components/ConfirmModal.js"></script>
    <script type="text/babel" src="components/Navbar.js"></script>

    <!-- Feature components -->
    <script type="text/babel" src="components/ModeSelector.js"></script>
    <script type="text/babel" src="components/MonthSelector.js"></script>
    <script type="text/babel" src="components/IncomeInput.js"></script>
    <script type="text/babel" src="components/AllocationSelector.js"></script>
    <script type="text/babel" src="components/BudgetBreakdown.js"></script>
    <script type="text/babel" src="components/BudgetBreakdownHierarchical.js"></script>
    <script type="text/babel" src="components/BudgetBreakdownSimple.js"></script>
    <script type="text/babel" src="components/ExpenseTracker.js"></script>
    <script type="text/babel" src="components/AddMoneyModal.js"></script>
    <script type="text/babel" src="components/GoalModal.js"></script>
    <script type="text/babel" src="components/GoalTracker.js"></script>
    <script type="text/babel" src="components/ExpectedBudget.js"></script>
    <script type="text/babel" src="components/Summary.js"></script>
    <script type="text/babel" src="components/BudgetChart.js"></script>
    <script type="text/babel" src="components/MonthlyOverview.js"></script>
    <script type="text/babel" src="components/SmartInsights.js"></script>

    <!-- App entry point — must be LAST -->
    <script type="text/babel" src="app.js"></script>

    <!-- Hide the loader once Firebase auth has resolved -->
    <script>
      (function waitForFirebase() {
        if (window.firebaseReady) {
          const loader = document.getElementById('firebase-loader');
          if (loader) loader.classList.add('hidden');
          return;
        }
        setTimeout(waitForFirebase, 50);
      })();
    </script>

    <!-- Register Service Worker for PWA offline support -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[PWA] Service worker registered:', reg.scope))
            .catch(err => console.warn('[PWA] Service worker registration failed:', err));
        });
      }
    </script>
</body>
</html>
